<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VV Chat App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar bg-base-100 shadow-md">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
          >
            <li><a>Item 1</a></li>
            <li>
              <a>Parent</a>
              <ul class="p-2">
                <li><a>Submenu 1</a></li>
                <li><a>Submenu 2</a></li>
              </ul>
            </li>
            <li><a>Item 3</a></li>
          </ul>
        </div>

        <a class="btn btn-ghost text-xl" href="../index.html"
          ><i data-lucide="message-circle-more"></i>VVchatApp</a
        >
      </div>

      <div class="navbar-end">
        <label class="toggle text-base-content">
          <input type="checkbox" value="dark" class="theme-controller" />

          <svg
            aria-label="sun"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </g>
          </svg>

          <svg
            aria-label="moon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2"
              fill="none"
              stroke="currentColor"
            >
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </g>
          </svg>
        </label>
      </div>
    </div>
    <!-- navbar end -->
    <!-- register section -->
    <div class="flex justify-center items-center h-[90vh]">
      <div class="card w-96 bg-base-100 border border-accent">
        <div class="card-body">
          <h2 class="font-bold text-2xl text-center">Register</h2>
          <div>
            <label for="Username" class="flex gap-1"
              ><i data-lucide="user" class="w-4"></i> Username</label
            >
            <input
              type="text"
              class="input input-accent mt-2 cursor-pointer"
              placeholder="Username"
            />
          </div>
          <div>
            <label for="Email-ID" class="flex gap-1"
              ><i data-lucide="mail" class="w-3"></i> Email-ID</label
            >
            <input
              type="text"
              class="input input-accent mt-2 cursor-pointer"
              placeholder="Email-ID"
            />
          </div>
          <div>
            <label for="Password" class="flex gap-1"
              ><i data-lucide="key-round" class="w-4"></i> Password</label
            >
            <input
              type="text"
              class="input input-accent mt-2 cursor-pointer"
              placeholder="Password"
            />
          </div>
          <p class="mt-3">
            Already Have an Account?
            <a href="./login.html" class="underline text-primary">Login</a>
          </p>
          <button class="btn btn-accent w-[95%] mt-3">Register</button>
        </div>
      </div>
    </div>
    <!-- registersection end -->
    <!-- icon start -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <!-- icon end -->
  </body>
</html>
